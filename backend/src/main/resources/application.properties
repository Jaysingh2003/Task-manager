spring.application.name=task-manager

# MySQL Database
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/Task_Mananger?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Root12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - auto creates/updates tables from your entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT secret key
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

server.port=${PORT:8080}
